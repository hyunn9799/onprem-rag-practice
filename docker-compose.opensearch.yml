# 실습용 OpenSearch 단일 노드. 보안 플러그인 OFF (프로덕션 금지, 로컬 전용).
# 한국어 형태소 분석(nori)이 필요하면 image 를 아래 Dockerfile.opensearch 로 교체.
services:
  opensearch:
    image: opensearchproject/opensearch:3.1.0   # :latest/:3 대신 버전 고정
    # build: { context: ., dockerfile: Dockerfile.opensearch }   # nori 쓸 때 이 줄로 교체
    container_name: opensearch-dev
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m   # T4 실습은 작게 시작
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  opensearch-data:
